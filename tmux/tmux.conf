set-window-option -g mode-keys vi

# Inherit path when creating new pane
bind-key c new-window -c "#{pane_current_path}"

# Split screen
# Also inherit current pane path for
bind | split-window -h -c "#{pane_current_path}"
bind S split-window -v -c "#{pane_current_path}"

# Move pane with vi keybind.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Rotate pane (move to next pane).
bind C-w select-pane -t :.+

# Use mouse
setw -g mouse on

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

bind x kill-pane
bind X kill-window

# y to copy
bind y copy-mode
# P to paste
bind P paste-buffer

# vi like selection
bind-key -T copy-mode-vi v send -X begin-selection
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "if [[ $(uname) == 'Darwin' ]]; then pbcopy; else xsel -ip && xsel -op | xsel -ib; fi"
unbind-key -T copy-mode-vi Enter
# bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "xsel -ip && xsel -op | xsel -ib"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "if [[ $(uname) == 'Darwin' ]]; then pbcopy; else xsel -ip && xsel -op | xsel -ib; fi"

# copy to clipboard with mouse
# https://zenn.dev/harachan/scraps/fcfd8e22f5ed5f
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel -bi"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "if [[ $(uname) == 'Darwin' ]]; then pbcopy; else xsel -ip && xsel -op | xsel -ib; fi"

# Set shorter escape time for vim
# https://github.com/neovim/neovim/wiki/FAQ#esc-in-tmux-or-gnu-screen-is-delayed
set-option -sg escape-time 10

# Reload config without restarting the server
bind r source-file ~/.tmux.conf \; display "reloaded"

# Show information on terminal prompt with starship and keep tmux config simple.
# Try not to use more than 4 colours.

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour238 fg=colour15 dim'
set -g status-right ''
set -g status-left-length 10

setw -g window-status-current-style 'fg=colour15 bg=colour241 bold'
setw -g window-status-current-format ' #I: #W '

setw -g window-status-style 'fg=colour15 bg=colour238'
setw -g window-status-format ' #I: #W '

# color when highlighting to select area to copy
set -g mode-style "bg=colour67 fg=colour238"

# border colour
set -g pane-border-style "fg=colour241"
set -g pane-active-border-style "fg=colour241"

# send shift+enter in Ghostty
# https://kurochan-note.hatenablog.jp/entry/2026/02/03/074837
bind -n S-Enter send-keys Escape "[13;2u"

# pane jump
bind-key f display-popup -E -w 80% -h 60% "~/.tmux/scripts/pane-jump.sh"

# scroll speed
bind -T copy-mode    WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode    WheelDownPane send -N1 -X scroll-down
bind -T copy-mode-vi WheelUpPane   send -N1 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N1 -X scroll-down

# increase pane buffer (default is 2000 lines)
set -g history-limit 10000
